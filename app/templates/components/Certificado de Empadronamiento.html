- Autor: Hugo Martín Alonso

- Descripción: componente con la información específica del trámite de solicitar certificado de empadronaiento. 
-->

<div id="detalles-titulo">
    {%if peticion%}
    <h2>Información</h2>
    {%else%}
    <h2>Introduce los Datos</h2>
    {%endif%}
</div>
<div id="detalles-contenido">
    <div id="contenido-col1">
        <label for="certificado-empadronamiento-dni">DNI:</label>
        <input type="text" id="certificado-empadronamiento-dni" name="dni" {%if peticion%}value="{{peticion.informacion.dni}}"  {%if peticion and (peticion.estadoActual.valor != "Asignada")%}readonly{%endif%}{%endif%} required pattern="^\d{8}\w{1}$">
        <label for="certificado-empadronamiento-nombre">Nombre:</label>
        <input type="text" id="certificado-empadronamiento-nombre" name="nombre" {%if peticion%}value="{{peticion.informacion.nombre}}"  {%if peticion and (peticion.estadoActual.valor != "Asignada")%}readonly{%endif%}{%endif%} required>
        <label for="certificado-empadronamiento-apellidos">Apellidos:</label>
        <input type="text" id="certificado-empadronamiento-apellidos" name="apellidos" {%if peticion%}value="{{peticion.informacion.apellidos}}"  {%if peticion and (peticion.estadoActual.valor != "Asignada")%}readonly{%endif%}{%endif%} required>
        <label for="certificado-empadronamiento-telefono">Teléfono:</label>
        <input type="tel" id="certificado-empadronamiento-telefono" name="telefono" {%if peticion%}value="{{peticion.informacion.telefono}}"  {%if peticion and (peticion.estadoActual.valor != "Asignada")%}readonly{%endif%}{%endif%} required pattern="^(?:\+34|0034)?[6789]\d{8}$">
        <label for="certificado-empadronamiento-email">Email:</label>
        <input type="email" id="certificado-empadronamiento-email" name="email" {%if peticion%}value="{{peticion.informacion.email}}"  {%if peticion and (peticion.estadoActual.valor != "Asignada")%}readonly{%endif%}{%endif%}>
        <label for="certificado-empadronamiento-motivo">Motivo de la solicitud:</label>
        <input type="text" id="certificado-empadronamiento-motivo" name="motivo" {%if peticion%}value="{{peticion.informacion.motivo}}"  {%if peticion and (peticion.estadoActual.valor != "Asignada")%}readonly{%endif%}{%endif%} required>
    </div>

</div>
