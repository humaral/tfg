{%extends "layout.html"%}

{%block title%}Empleados{%endblock%}

{%block css%}
<link rel="stylesheet" href="{{url_for('static', filename='css/empleados.css')}}">
{%endblock%}

{%block body%}
{%include "components/menu.html"%}
<main id="empleados-page">
    <div id="empleados-controllers">
        <div class="filter" id="empleados-filters">
            <input type="search" class="filter" id="filter-username-empleados" placeholder="Usuario" title="Filtrar por usuario del empleado.">
            <input type="search" class="filter" id="filter-nombre-empleados" placeholder="Nombre" title="Filtrar por nombre/apellidos del empleado.">
            <input type="search" class="filter" id="filter-email-empleados" placeholder="Email" title="Filtrar por email del empleado.">
            <select class="filter" class="filter" id="filter-rol-empleados">
                <option value="0">--Selecciona un rol--</option>
                {%for rol in filtro_roles%}
                <option value="{{rol.id}}">{{rol.valor}}</option>
                {%endfor%}
            </select>
            <label id="label-activo-empleados" for="filter-activo-empleados">
                Activo:
                <input type="checkbox" class="filter" id="filter-activo-empleados" checked>
            </label>
        </div>
        {%if "crear_empleado" in session.permisos%}
        <a href="{{url_for('dashboard.new_empleado')}}" id="nuevo-empleado">
            <iconify-icon icon="lucide:user-round-plus"></iconify-icon>
            Nuevo Empleado
        </a>
        {%endif%}
    </div>
    <div class="table" id="empleados-card">
        <table class="table" id="empleados-table">
            <thead>
                <tr>
                    <th class="ordenable" data-orden="username">
                        <div>
                            Usuario
                            <iconify-icon id="orden-icono-empleados" icon="tabler:arrow-up"></iconify-icon>
                        </div>
                    </th>
                    <th class="ordenable" data-orden="nombre">
                        <div> Nombre </div>
                    </th>
                    <th class="ordenable" data-orden="email">
                        <div> Email </div>
                    </th>
                    <th class="ordenable" data-orden="rol">
                        <div> Rol </div>
                    </th>
                    <th>
                        <div> ? </div>
                    </th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>
    <div class="pagination">
        <div id="empleados-per_page">
            <select class="filter" id="filter-num-empleados">
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="25">25</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
            <p>Empleados por página</p>
        </div>
        <div id="empleados-pagination">
            <div>
                <iconify-icon id="prev-page-empleados" icon="iconoir:nav-arrow-left"></iconify-icon>
                <span id="lista-pages-empleados"></span>
                <iconify-icon id="next-page-empleados" icon="iconoir:nav-arrow-right"></iconify-icon>
            </div>
        </div>
    </div>
</main>
{%endblock%}

{%block js%}
<script src='{{url_for("static", filename="js/empleados.js")}}'></script>
{%endblock%}
